<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Opciones</title>
  <link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold:       #c9933a;
      --gold-light: #f0c96e;
      --gold-dark:  #7a5418;
      --text-light: #f5e9c8;
    }

    @keyframes flicker {
      0%,100% { opacity:1;   text-shadow: 0 0 18px var(--gold), 0 0 40px var(--gold-dark); }
      45%      { opacity:.92; text-shadow: 0 0 10px var(--gold), 0 0 22px var(--gold-dark); }
      50%      { opacity:.98; }
      75%      { opacity:.95; text-shadow: 0 0 24px var(--gold-light), 0 0 50px var(--gold); }
    }
    @keyframes rise {
      from { opacity:0; transform:translateY(30px); }
      to   { opacity:1; transform:translateY(0); }
    }
    @keyframes bar {
      from { height:4px; } to { height:16px; }
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 40px 16px;
      background: radial-gradient(ellipse at center top, #3b1f00 0%, #0d0600 60%, #000 100%);
      font-family: 'IM Fell English', serif;
      color: var(--text-light);
      overflow-x: hidden;
    }
    body::before, body::after {
      content: '';
      position: fixed;
      width: 260px; height: 260px;
      border-radius: 50%;
      pointer-events: none;
      filter: blur(80px);
      opacity: .45;
    }
    body::before { top:-40px; left:-40px;  background: radial-gradient(circle, #d4720a 0%, transparent 70%); }
    body::after  { top:-40px; right:-40px; background: radial-gradient(circle, #d4720a 0%, transparent 70%); }

    /* PANEL */
    .panel {
      position: relative;
      width: 460px;
      max-width: 100%;
      padding: 52px 44px 48px;
      background: linear-gradient(160deg, #1f1208 0%, #110a02 100%);
      border: 2px solid var(--gold-dark);
      box-shadow:
        0 0 0 1px #000,
        0 0 0 4px var(--gold-dark),
        0 0 0 5px #000,
        0 0 60px rgba(180,100,10,.35),
        inset 0 0 40px rgba(0,0,0,.6);
      animation: rise .8s ease both;
    }
    .panel::before, .panel::after,
    .panel .corner-br, .panel .corner-bl {
      content: '✦';
      position: absolute;
      font-size: 1.1rem;
      color: var(--gold);
      line-height: 1;
    }
    .panel::before   { top:10px;    left:10px;  }
    .panel::after    { top:10px;    right:10px; }
    .panel .corner-br { bottom:10px; right:10px; }
    .panel .corner-bl { bottom:10px; left:10px;  }

    /* TIPOGRAFÍA */
    h1 {
      text-align: center;
      font-size: 2rem;
      letter-spacing: .12em;
      color: var(--gold-light);
      text-transform: uppercase;
      animation: flicker 4s infinite;
      margin-bottom: 8px;
    }
    .crest     { text-align:center; font-size:2.8rem; margin-bottom:6px; line-height:1; }
    .subtitle  { text-align:center; font-style:italic; font-size:.78rem; color:var(--gold-dark); letter-spacing:.2em; text-transform:uppercase; margin-bottom:36px; }
    .footer-text { text-align:center; margin-top:32px; font-size:.68rem; letter-spacing:.22em; color:var(--gold-dark); text-transform:uppercase; opacity:.6; }

    hr {
      border: none;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--gold-dark), transparent);
      margin-bottom: 28px;
    }

    /* SEPARADOR DE SECCIÓN */
    .sec-label {
      text-align: center;
      font-size: .7rem;
      letter-spacing: .28em;
      text-transform: uppercase;
      color: var(--gold-dark);
      margin: 24px 0 16px;
      position: relative;
    }
    .sec-label::before, .sec-label::after {
      content: '';
      position: absolute;
      top: 50%; width: 26%; height: 1px;
    }
    .sec-label::before { left:0;   background: linear-gradient(to right, transparent, var(--gold-dark)); }
    .sec-label::after  { right:0;  background: linear-gradient(to left,  transparent, var(--gold-dark)); }

    /* SLIDER ROW */
    .slider-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }
    .s-icon { font-size:1.1rem; width:22px; text-align:center; flex-shrink:0; }
    .s-name {
      font-family: 'IM Fell English', serif;
      font-size: .85rem;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--text-light);
      width: 100px;
      flex-shrink: 0;
    }
    .s-track { flex:1; }
    .s-val   { font-size:.82rem; color:var(--gold); width:34px; text-align:right; flex-shrink:0; }

    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 5px;
      background: #2a1a06;
      border: 1px solid var(--gold-dark);
      outline: none;
      cursor: pointer;
      border-radius: 0;
      padding: 0; margin: 0;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px; height: 20px;
      background: linear-gradient(to bottom, var(--gold-light), var(--gold));
      border: 1px solid var(--gold-dark);
      border-radius: 0;
      box-shadow: 0 0 6px rgba(201,147,58,.5);
      cursor: pointer;
      transition: box-shadow .2s;
    }
    input[type="range"]:hover::-webkit-slider-thumb {
      box-shadow: 0 0 14px rgba(240,201,110,.9);
    }
    input[type="range"]::-moz-range-thumb {
      width:14px; height:20px;
      background: linear-gradient(to bottom, var(--gold-light), var(--gold));
      border:1px solid var(--gold-dark);
      border-radius:0;
    }

    /* BOTONES */
    .btn {
      position: relative;
      display: block;
      width: 100%;
      padding: 14px 20px;
      background: linear-gradient(135deg, #2c1a04 0%, #1a0d02 100%);
      border: 1px solid var(--gold-dark);
      color: var(--gold-light);
      font-family: 'IM Fell English', serif;
      font-size: 1.05rem;
      letter-spacing: .15em;
      text-transform: uppercase;
      text-align: center;
      text-decoration: none;
      cursor: pointer;
      transition: background .25s, color .25s, border-color .25s, box-shadow .25s, transform .15s;
      box-shadow: 0 2px 10px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,220,120,.07);
      outline: none;
      overflow: hidden;
    }
    .btn .icon-l, .btn .icon-r {
      position: absolute;
      top: 50%; transform: translateY(-50%);
      font-size: .9rem;
      color: var(--gold-dark);
      transition: color .25s, opacity .25s;
      opacity: .7;
    }
    .btn .icon-l { left:14px; }
    .btn .icon-r { right:14px; }
    .btn:hover, .btn:focus-visible {
      background: linear-gradient(135deg, #4a2d06 0%, #2c1904 100%);
      border-color: var(--gold-light);
      color: #fff8e0;
      box-shadow: 0 0 18px rgba(200,140,30,.45), 0 4px 16px rgba(0,0,0,.6);
      transform: translateY(-2px);
    }
    .btn:hover .icon-l, .btn:hover .icon-r { color:var(--gold-light); opacity:1; }
    .btn:active { transform:translateY(1px); box-shadow:0 1px 6px rgba(0,0,0,.7); }

    /* GRID IDIOMAS */
    .lang-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 4px;
    }
    .lang-btn {
      position: relative;
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
      padding: 11px 14px;
      background: linear-gradient(135deg, #2c1a04 0%, #1a0d02 100%);
      border: 1px solid var(--gold-dark);
      color: var(--gold-light);
      font-family: 'IM Fell English', serif;
      font-size: .88rem;
      letter-spacing: .1em;
      text-transform: uppercase;
      cursor: pointer;
      outline: none;
      transition: background .2s, border-color .2s, box-shadow .2s, transform .12s;
      box-shadow: 0 2px 8px rgba(0,0,0,.45);
    }
    .lang-btn .flag { font-size:1.1rem; flex-shrink:0; }
    .lang-btn:hover, .lang-btn:focus-visible {
      background: linear-gradient(135deg, #4a2d06 0%, #2c1904 100%);
      border-color: var(--gold-light);
      color: #fff8e0;
      box-shadow: 0 0 14px rgba(200,140,30,.4);
      transform: translateY(-1px);
    }
    .lang-btn.active {
      border-color: var(--gold-light);
      background: linear-gradient(135deg, #5a3508 0%, #3a2005 100%);
      box-shadow: 0 0 16px rgba(240,201,110,.3), inset 0 0 8px rgba(0,0,0,.4);
      color: #fff8e0;
    }
    .lang-btn.active::after {
      content: '✔';
      position: absolute;
      right: 10px; top: 50%; transform: translateY(-50%);
      font-size: .7rem;
      color: var(--gold-light);
    }

    /* ACCIONES */
    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-top: 28px;
    }

    /* INDICADOR MÚSICA */
    .music-indicator {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 4px;
    }
    .music-bars { display:flex; align-items:flex-end; gap:3px; height:16px; }
    .music-bars span { display:block; width:3px; background:var(--gold-dark); }
    .music-bars.playing span { background:var(--gold); }
    .music-bars.playing span:nth-child(1) { animation: bar .8s  ease infinite alternate; }
    .music-bars.playing span:nth-child(2) { animation: bar .6s  ease infinite alternate .2s; }
    .music-bars.playing span:nth-child(3) { animation: bar 1.0s ease infinite alternate .1s; }
    .music-bars.playing span:nth-child(4) { animation: bar .7s  ease infinite alternate .3s; }
    .music-label { font-size:.68rem; letter-spacing:.2em; text-transform:uppercase; color:var(--gold-dark); }
    .music-label.playing { color:var(--gold); }

    /* TOAST */
    #toast {
      position: fixed;
      bottom: 28px; left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #1f1208;
      border: 1px solid var(--gold);
      color: var(--gold-light);
      padding: 10px 28px;
      font-family: 'IM Fell English', serif;
      font-size: .82rem;
      letter-spacing: .15em;
      text-transform: uppercase;
      opacity: 0; pointer-events: none;
      transition: opacity .35s, transform .35s;
      box-shadow: 0 0 20px rgba(201,147,58,.3);
      z-index: 100;
    }
    #toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<div class="panel">
  <span class="corner-br">✦</span>
  <span class="corner-bl">✦</span>

  <div class="crest">⚙</div>
  <h1 data-i18n="title">Opciones</h1>
  <p class="subtitle" data-i18n="subtitle">— Forja tu experiencia —</p>
  <hr/>

  <!-- Indicador música -->
  <div class="music-indicator">
    <div class="music-bars" id="music-bars">
      <span style="height:10px"></span><span style="height:6px"></span>
      <span style="height:14px"></span><span style="height:8px"></span>
    </div>
    <span class="music-label" id="music-label" data-i18n="music_off">Música desactivada</span>
  </div>

  <!-- PANTALLA -->
  <div class="sec-label" data-i18n="sec_screen">Pantalla</div>
  <div class="slider-row">
    <span class="s-icon">☀</span>
    <span class="s-name" data-i18n="brightness">Brillo</span>
    <div class="s-track"><input type="range" id="sl-bright" min="20" max="100" value="80" oninput="onSlider(this,'vbright'); applyBrightness()"/></div>
    <span class="s-val" id="vbright">80%</span>
  </div>

  <!-- SONIDO -->
  <div class="sec-label" data-i18n="sec_sound">Sonido</div>
  <div class="slider-row">
    <span class="s-icon">🔊</span>
    <span class="s-name" data-i18n="vol_general">General</span>
    <div class="s-track"><input type="range" id="sl-general" min="0" max="100" value="80" oninput="onSlider(this,'vgeneral'); applyVolumes()"/></div>
    <span class="s-val" id="vgeneral">80%</span>
  </div>
  <div class="slider-row">
    <span class="s-icon">🎵</span>
    <span class="s-name" data-i18n="vol_music">Música</span>
    <div class="s-track"><input type="range" id="sl-music" min="0" max="100" value="70" oninput="onSlider(this,'vmusic'); applyVolumes()"/></div>
    <span class="s-val" id="vmusic">70%</span>
  </div>
  <div class="slider-row">
    <span class="s-icon">⚔</span>
    <span class="s-name" data-i18n="vol_game">Juego</span>
    <div class="s-track"><input type="range" id="sl-game" min="0" max="100" value="75" oninput="onSlider(this,'vgame')"/></div>
    <span class="s-val" id="vgame">75%</span>
  </div>
  <div class="slider-row">
    <span class="s-icon">✨</span>
    <span class="s-name" data-i18n="vol_fx">Efectos</span>
    <div class="s-track"><input type="range" id="sl-fx" min="0" max="100" value="65" oninput="onSlider(this,'vfx')"/></div>
    <span class="s-val" id="vfx">65%</span>
  </div>

  <!-- IDIOMA -->
  <div class="sec-label" data-i18n="sec_lang">Idioma</div>
  <div class="lang-grid">
    <button class="lang-btn active" data-lang="es"  onclick="selectLang(this)"><span class="flag">🇪🇸</span><span>Español</span></button>
    <button class="lang-btn"        data-lang="en"  onclick="selectLang(this)"><span class="flag">🇬🇧</span><span>English</span></button>
    <button class="lang-btn"        data-lang="ca"  onclick="selectLang(this)"><span class="flag">🏴</span><span>Català</span></button>
    <button class="lang-btn"        data-lang="and" onclick="selectLang(this)"><span class="flag">💃</span><span>Andalú</span></button>
    <button class="lang-btn"        data-lang="de"  onclick="selectLang(this)"><span class="flag">🇩🇪</span><span>Deutsch</span></button>
    <button class="lang-btn"        data-lang="el"  onclick="selectLang(this)"><span class="flag">🇬🇷</span><span>Ελληνικά</span></button>
    <button class="lang-btn"        data-lang="la"  onclick="selectLang(this)"><span class="flag">🏛</span><span>Latina</span></button>
    <button class="lang-btn"        data-lang="ja"  onclick="selectLang(this)"><span class="flag">🇯🇵</span><span>日本語</span></button>
  </div>

  <!-- ACCIONES -->
  <div class="actions">
    <a href="menu.html" class="btn">
      <span class="icon-l">←</span>
      <span data-i18n="btn_back">Volver</span>
      <span class="icon-r">←</span>
    </a>
    <button class="btn" onclick="save()">
      <span class="icon-l">✦</span>
      <span data-i18n="btn_save">Guardar</span>
      <span class="icon-r">✦</span>
    </button>
  </div>

  <p class="footer-text">Anno Domini MXXVI</p>
</div>

<div id="toast">✦ <span id="toast-msg">Cambios guardados</span> ✦</div>

<script>
// ── TRADUCCIONES ──────────────────────────────────────────────
const I18N = {
  es:  { title:'Opciones',   subtitle:'— Forja tu experiencia —',         sec_screen:'Pantalla', brightness:'Brillo',      sec_sound:'Sonido',   vol_general:'General', vol_music:'Música',    vol_game:'Juego',     vol_fx:'Efectos',  sec_lang:'Idioma',   btn_back:'Volver',      btn_save:'Guardar',      music_off:'Música desactivada', music_on:'Reproduciendo', toast:'Cambios guardados' },
  en:  { title:'Options',    subtitle:'— Forge your experience —',         sec_screen:'Display',  brightness:'Brightness',  sec_sound:'Sound',    vol_general:'Master',  vol_music:'Music',     vol_game:'Game',      vol_fx:'Effects',  sec_lang:'Language', btn_back:'Back',        btn_save:'Save',         music_off:'Music off',          music_on:'Now playing',   toast:'Changes saved' },
  ca:  { title:'Opcions',    subtitle:'— Forja la teva experiència —',     sec_screen:'Pantalla', brightness:'Brillantor',  sec_sound:'So',       vol_general:'General', vol_music:'Música',    vol_game:'Joc',       vol_fx:'Efectes',  sec_lang:'Idioma',   btn_back:'Tornar',      btn_save:'Desar',        music_off:'Música desactivada', music_on:'Reproduint',    toast:'Canvis desats' },
  and: { title:'Opisioneh',  subtitle:'— Forja tu esperiencia, chaval —', sec_screen:'Pantayya', brightness:'Brío',        sec_sound:'Sonío',    vol_general:'Generá',  vol_music:'Musiquisiya',vol_game:'Jueguisio', vol_fx:'Efetoh',   sec_lang:'Idiomiya', btn_back:'Pazatráh',    btn_save:'Guardá',       music_off:'Musiquisiya apagá',  music_on:'Sonando',       toast:'Cambio guardaíto' },
  de:  { title:'Optionen',   subtitle:'— Schmiedet eure Erfahrung —',     sec_screen:'Anzeige',  brightness:'Helligkeit',  sec_sound:'Ton',      vol_general:'Master',  vol_music:'Musik',     vol_game:'Spiel',     vol_fx:'Effekte',  sec_lang:'Sprache',  btn_back:'Zurück',      btn_save:'Speichern',    music_off:'Musik aus',          music_on:'Spielt',        toast:'Gespeichert' },
  el:  { title:'Επιλογές',  subtitle:'— Σφυρηλάτησε την εμπειρία σου —', sec_screen:'Οθόνη',   brightness:'Φωτεινότητα', sec_sound:'Ήχος',    vol_general:'Γενικά',  vol_music:'Μουσική',   vol_game:'Παιχνίδι',  vol_fx:'Εφέ',      sec_lang:'Γλώσσα',  btn_back:'Πίσω',        btn_save:'Αποθήκευση',   music_off:'Μουσική ανενεργή',   music_on:'Αναπαραγωγή',   toast:'Αποθηκεύτηκε' },
  la:  { title:'Optiones',   subtitle:'— Fac experientiam tuam —',        sec_screen:'Aspectus', brightness:'Fulgor',      sec_sound:'Sonus',    vol_general:'Generalis',vol_music:'Musica',    vol_game:'Ludus',     vol_fx:'Effectus', sec_lang:'Lingua',   btn_back:'Redi',        btn_save:'Serva',        music_off:'Musica silens',      music_on:'Canit',         toast:'Res servatae' },
  ja:  { title:'オプション', subtitle:'— あなたの体験を鍛えよ —',         sec_screen:'画面',     brightness:'輝度',        sec_sound:'サウンド', vol_general:'マスター', vol_music:'音楽',      vol_game:'ゲーム',    vol_fx:'効果音',   sec_lang:'言語',     btn_back:'戻る',        btn_save:'保存',         music_off:'音楽オフ',           music_on:'再生中',        toast:'保存しました' },
};

let currentLang = localStorage.getItem('medieval_lang') || 'es';

function applyTranslations(lang) {
  const t = I18N[lang] || I18N.es;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const k = el.getAttribute('data-i18n');
    if (t[k] !== undefined) el.textContent = t[k];
  });
  updateMusicLabel();
}

function selectLang(btn) {
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentLang = btn.dataset.lang;
  localStorage.setItem('medieval_lang', currentLang);
  applyTranslations(currentLang);
}

// ── SLIDERS ───────────────────────────────────────────────────
function onSlider(el, valId) {
  document.getElementById(valId).textContent = el.value + '%';
}
function applyBrightness() {
  document.body.style.filter = `brightness(${document.getElementById('sl-bright').value / 100})`;
}
function applyVolumes() {
  if (!gainGeneral || !gainMusic) return;
  const g = document.getElementById('sl-general').value / 100;
  const m = document.getElementById('sl-music').value   / 100;
  gainGeneral.gain.setTargetAtTime(g,     audioCtx.currentTime, 0.05);
  gainMusic.gain.setTargetAtTime(m * g,   audioCtx.currentTime, 0.05);
}

// ── MÚSICA MEDIEVAL (Web Audio API) ──────────────────────────
let audioCtx = null, gainGeneral = null, gainMusic = null, musicPlaying = false;

const MELODY = [
  [261.63,.6],[293.66,.4],[329.63,.6],[349.23,.4],[392.00,.8],[440.00,.6],
  [392.00,.4],[349.23,.4],[329.63,.6],[293.66,.4],[261.63,1.2],
  [392.00,.5],[349.23,.4],[329.63,.5],[293.66,.4],[261.63,.5],
  [293.66,.4],[329.63,.6],[392.00,1.2],[261.63,.8],[329.63,.6],[392.00,.8],
  [440.00,.6],[392.00,.4],[349.23,.8],[293.66,.6],[261.63,1.4],
];

function playNote(freq, start, dur) {
  [1,2,3,4].forEach((h,i) => {
    const amp = [0.45,0.22,0.11,0.05][i];
    const osc = audioCtx.createOscillator();
    const env = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.value = freq * h;
    env.gain.setValueAtTime(0, start);
    env.gain.linearRampToValueAtTime(amp, start + 0.05);
    env.gain.setValueAtTime(amp, start + dur - 0.07);
    env.gain.linearRampToValueAtTime(0, start + dur);
    osc.connect(env); env.connect(gainMusic);
    osc.start(start); osc.stop(start + dur + 0.02);
  });
}

function startMusic() {
  if (musicPlaying) return;
  audioCtx    = new (window.AudioContext || window.webkitAudioContext)();
  gainGeneral = audioCtx.createGain();
  gainMusic   = audioCtx.createGain();

  // Reverb catedral
  const reverb = audioCtx.createConvolver();
  const rLen   = audioCtx.sampleRate * 3;
  const rBuf   = audioCtx.createBuffer(2, rLen, audioCtx.sampleRate);
  for (let c=0;c<2;c++) { const d=rBuf.getChannelData(c); for(let i=0;i<rLen;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/rLen,2.2); }
  reverb.buffer = rBuf;

  const dry = audioCtx.createGain(); dry.gain.value = 0.6;
  const wet = audioCtx.createGain(); wet.gain.value = 0.4;
  gainMusic.connect(dry); dry.connect(gainGeneral);
  gainMusic.connect(reverb); reverb.connect(wet); wet.connect(gainGeneral);
  gainGeneral.connect(audioCtx.destination);

  const g = document.getElementById('sl-general').value / 100;
  const m = document.getElementById('sl-music').value   / 100;
  gainGeneral.gain.value = g;
  gainMusic.gain.value   = m;

  const BPM = 56, beat = 60/BPM;
  let t = audioCtx.currentTime + 0.1;
  for (let rep=0; rep<50; rep++) {
    MELODY.forEach(([freq,beats]) => { playNote(freq, t, beats*beat*0.9); t += beats*beat; });
    t += beat * 2;
  }

  musicPlaying = true;
  updateMusicLabel();
}

function updateMusicLabel() {
  const t = I18N[currentLang] || I18N.es;
  const bars  = document.getElementById('music-bars');
  const label = document.getElementById('music-label');
  if (musicPlaying) {
    bars.classList.add('playing');
    label.textContent = t.music_on;
    label.classList.add('playing');
  } else {
    bars.classList.remove('playing');
    label.textContent = t.music_off;
    label.classList.remove('playing');
  }
}

document.addEventListener('click', function init() {
  startMusic();
  document.removeEventListener('click', init);
});

// ── GUARDAR ───────────────────────────────────────────────────
function save() {
  localStorage.setItem('medievalSettings', JSON.stringify({
    brightness: document.getElementById('sl-bright').value,
    volGeneral: document.getElementById('sl-general').value,
    volMusic:   document.getElementById('sl-music').value,
    volGame:    document.getElementById('sl-game').value,
    volFx:      document.getElementById('sl-fx').value,
    lang: currentLang,
  }));
  const t = I18N[currentLang] || I18N.es;
  document.getElementById('toast-msg').textContent = t.toast;
  const toast = document.getElementById('toast');
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2400);
}

// ── CARGAR ────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  // idioma
  const lang = localStorage.getItem('medieval_lang') || 'es';
  currentLang = lang;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === lang));
  applyTranslations(lang);

  // ajustes guardados
  const raw = localStorage.getItem('medievalSettings');
  if (!raw) return;
  const s = JSON.parse(raw);
  const set = (id, valId, v) => { if(!v) return; document.getElementById(id).value=v; document.getElementById(valId).textContent=v+'%'; };
  set('sl-bright',  'vbright',  s.brightness);
  set('sl-general', 'vgeneral', s.volGeneral);
  set('sl-music',   'vmusic',   s.volMusic);
  set('sl-game',    'vgame',    s.volGame);
  set('sl-fx',      'vfx',      s.volFx);
  if (s.brightness) document.body.style.filter = `brightness(${s.brightness/100})`;
});
</script>
