<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Gladiadores</title>
  <link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --gold: #c9933a; --gold-light: #f0c96e; --gold-dark: #7a5418;
      --text-light: #f5e9c8; --crimson: #7a0b0b;
    }
    @keyframes flicker {
      0%,100%{opacity:1;text-shadow:0 0 18px var(--gold),0 0 40px var(--gold-dark)}
      45%{opacity:.92;text-shadow:0 0 10px var(--gold),0 0 22px var(--gold-dark)}
      75%{opacity:.95;text-shadow:0 0 24px var(--gold-light),0 0 50px var(--gold)}
    }
    @keyframes rise { from{opacity:0;transform:translateY(24px)} to{opacity:1;transform:translateY(0)} }
    @keyframes gladiator-in { from{opacity:0;transform:scale(.92)} to{opacity:1;transform:scale(1)} }

    html, body {
      height: 100%; margin: 0;
      font-family: 'IM Fell English', serif;
      color: var(--text-light);
      overflow: hidden;
    }

    /* ── FONDO COLISEO ── */
    .bg {
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse at 50% 100%, #3b1f00 0%, #0d0600 55%, #000 100%);
    }
    /* Arcos del coliseo dibujados en CSS */
    .colosseum {
      position: fixed; bottom: 0; left: 0; right: 0;
      height: 55vh; z-index: 1; overflow: hidden;
    }
    .colosseum svg { width: 100%; height: 100%; }

    /* Antorchas */
    .torch { position:fixed; z-index:2; width:260px; height:260px; border-radius:50%; pointer-events:none; filter:blur(80px); opacity:.4; }
    .torch-l { top:-40px; left:-40px; background:radial-gradient(circle,#d4720a 0%,transparent 70%); }
    .torch-r { top:-40px; right:-40px; background:radial-gradient(circle,#d4720a 0%,transparent 70%); }

    /* Arena */
    .arena-floor {
      position: fixed; bottom: 0; left: 0; right: 0; height: 18vh; z-index: 2;
      background: linear-gradient(to top, #2a1500 0%, #3b1e00 60%, transparent 100%);
    }

    /* ── LAYOUT ── */
    .screen {
      position: fixed; inset: 0; z-index: 10;
      display: flex; flex-direction: column; align-items: center;
      padding: 0 20px 20px;
    }

    /* ── HEADER ── */
    .header {
      width: 100%; max-width: 900px;
      display: flex; align-items: center; justify-content: space-between;
      padding: 20px 0 10px;
      animation: rise .6s ease both;
    }
    .gladiator-name {
      flex: 1; text-align: center;
      font-size: clamp(1.4rem, 3vw, 2.2rem);
      letter-spacing: .15em; text-transform: uppercase;
      color: var(--gold-light);
      animation: flicker 4s infinite;
    }
    .btn-back {
      position: relative;
      padding: 10px 20px;
      background: linear-gradient(135deg,#2c1a04,#1a0d02);
      border: 1px solid var(--gold-dark);
      color: var(--gold-light);
      font-family: 'IM Fell English', serif;
      font-size: .85rem; letter-spacing: .12em; text-transform: uppercase;
      cursor: pointer; text-decoration: none; outline: none;
      transition: background .2s, border-color .2s, box-shadow .2s, transform .12s;
      box-shadow: 0 2px 8px rgba(0,0,0,.5);
      white-space: nowrap;
    }
    .btn-back:hover { background:linear-gradient(135deg,#4a2d06,#2c1904); border-color:var(--gold-light); box-shadow:0 0 14px rgba(200,140,30,.4); transform:translateY(-1px); }

    /* ── ARENA ZONE ── */
    .arena-zone {
      flex: 1; width: 100%; max-width: 900px;
      display: flex; align-items: center; justify-content: center;
      gap: 0; position: relative;
    }

    /* Flechas */
    .arrow-btn {
      width: 56px; height: 56px; flex-shrink: 0;
      background: linear-gradient(135deg,#2c1a04,#1a0d02);
      border: 1px solid var(--gold-dark);
      color: var(--gold-light);
      font-size: 1.6rem; cursor: pointer; outline: none;
      display: flex; align-items: center; justify-content: center;
      transition: background .2s, border-color .2s, box-shadow .2s, transform .12s;
      box-shadow: 0 2px 8px rgba(0,0,0,.5);
      font-family: serif;
    }
    .arrow-btn:hover { background:linear-gradient(135deg,#4a2d06,#2c1904); border-color:var(--gold-light); box-shadow:0 0 16px rgba(200,140,30,.4); transform:scale(1.08); }

    /* Gladiador SVG */
    .gladiator-wrap {
      flex: 1; display: flex; justify-content: center; align-items: flex-end;
      height: 100%;
    }
    .gladiator-svg {
      height: min(52vh, 380px);
      filter: drop-shadow(0 0 30px rgba(201,147,58,.25));
      animation: gladiator-in .4s ease both;
    }

    /* ── PANEL STATS + ELEGIR ── */
    .bottom-zone {
      width: 100%; max-width: 820px;
      display: flex; flex-direction: column; align-items: center;
      gap: 14px;
      animation: rise .7s ease both .1s;
    }

    .stats-panel {
      width: 100%;
      background: linear-gradient(160deg,#1f1208,#110a02);
      border: 2px solid var(--gold-dark);
      box-shadow: 0 0 0 1px #000, 0 0 0 4px var(--gold-dark), 0 0 0 5px #000, 0 0 40px rgba(180,100,10,.3), inset 0 0 30px rgba(0,0,0,.5);
      padding: 18px 28px 20px;
      position: relative;
    }
    .stats-panel::before, .stats-panel::after,
    .stats-panel .c-br, .stats-panel .c-bl {
      content:'✦'; position:absolute; font-size:.9rem; color:var(--gold); line-height:1;
    }
    .stats-panel::before { top:7px; left:7px; }
    .stats-panel::after  { top:7px; right:7px; }
    .stats-panel .c-br   { bottom:7px; right:7px; }
    .stats-panel .c-bl   { bottom:7px; left:7px; }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px 6px;
      text-align: center;
    }
    .stat-item { display:flex; flex-direction:column; align-items:center; gap:5px; }
    .stat-name {
      font-size: clamp(.6rem,.9vw,.75rem);
      letter-spacing: .12em; text-transform: uppercase;
      color: var(--gold-dark);
    }
    .stars { display:flex; gap:3px; justify-content:center; }
    .star { font-size: clamp(.85rem,1.4vw,1.1rem); transition: color .3s; }
    .star.on  { color: var(--gold-light); text-shadow: 0 0 6px var(--gold); }
    .star.off { color: #3a2508; }

    /* Botón elegir */
    .btn-choose {
      position: relative;
      width: 100%; max-width: 340px;
      padding: 14px 20px;
      background: linear-gradient(135deg,#2c1a04,#1a0d02);
      border: 1px solid var(--gold-dark);
      color: var(--gold-light);
      font-family: 'IM Fell English', serif;
      font-size: 1.05rem; letter-spacing: .2em; text-transform: uppercase;
      text-align: center; cursor: pointer; outline: none;
      transition: background .25s, border-color .25s, box-shadow .25s, transform .15s;
      box-shadow: 0 2px 10px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,220,120,.07);
    }
    .btn-choose .ic { position:absolute; top:50%; transform:translateY(-50%); font-size:.9rem; color:var(--gold-dark); transition:color .25s, opacity .25s; opacity:.7; }
    .btn-choose .ic-l { left:14px; }
    .btn-choose .ic-r { right:14px; }
    .btn-choose:hover { background:linear-gradient(135deg,#5a3508,#3a2005); border-color:var(--gold-light); color:#fff8e0; box-shadow:0 0 22px rgba(200,140,30,.5),0 4px 16px rgba(0,0,0,.6); transform:translateY(-2px); }
    .btn-choose:hover .ic { color:var(--gold-light); opacity:1; }

    /* Dots indicadores */
    .dots { display:flex; gap:8px; justify-content:center; }
    .dot { width:8px; height:8px; background:var(--gold-dark); border:1px solid var(--gold-dark); transition:background .3s; }
    .dot.active { background:var(--gold-light); box-shadow:0 0 6px var(--gold); }
  </style>
</head>
<body>

<div class="bg"></div>

<!-- COLISEO SVG -->

    <!-- Pilares nivel 2 -->

      <rect x="374" y="220" width="12" height="93"/><rect x="480" y="220" width="12" height="93"/>
      <rect x="494" y="220" width="12" height="93"/><rect x="600" y="220" width="12" height="93"/>

<div class="arena-floor"></div>

<!-- ══════════════════ PANTALLA ══════════════════ -->
<div class="screen">

  <!-- HEADER -->
  <div class="header">
    <a href="menu.html" class="btn-back">← <span data-i18n="btn_back">Volver</span></a>
    <div class="gladiator-name" id="gladiator-name">Spartacus</div>
    <div style="width:100px"></div>
  </div>

  <!-- ARENA ZONE: flechas + gladiador -->
  <div class="arena-zone">
    <button class="arrow-btn" onclick="navigate(-1)" aria-label="Anterior">&#9664;</button>

    <div class="gladiator-wrap">
      <svg id="gladiator-svg" class="gladiator-svg" viewBox="0 0 200 420" xmlns="http://www.w3.org/2000/svg"></svg>
    </div>

    <button class="arrow-btn" onclick="navigate(1)" aria-label="Siguiente">&#9654;</button>
  </div>

  <!-- BOTTOM: stats + elegir -->
  <div class="bottom-zone">

    <!-- Stats -->
    <div class="stats-panel">
      <span class="c-br">✦</span><span class="c-bl">✦</span>
      <div class="stats-grid" id="stats-grid"></div>
    </div>

    <!-- Dots -->
    <div class="dots" id="dots"></div>

    <!-- Botón elegir -->
    <button class="btn-choose" onclick="chooseGladiator()">
      <span class="ic ic-l">⚔</span>
      <span data-i18n="btn_choose">Elegir Gladiador</span>
      <span class="ic ic-r">⚔</span>
    </button>

  </div>
</div>

<script>
// ══════════════════════════════════════════════
// DATOS DE GLADIADORES
// ══════════════════════════════════════════════
const GLADIATORS = [
  {
    name: "Spartacus",
    nameLA: "Spartacus",
    stats: { fuerza:3, velocidad:4, agilidad:4, resistencia:3, armas:2 },
    // Sin armadura, sin arma
    draw: drawSpartacus
  },
  {
    name: "Maximus",
    nameLA: "Maximus Decimus",
    stats: { fuerza:5, velocidad:2, agilidad:2, resistencia:5, armas:4 },
    draw: drawMaximus
  },
  {
    name: "Commodus",
    nameLA: "Commodus Verus",
    stats: { fuerza:3, velocidad:4, agilidad:5, resistencia:2, armas:5 },
    draw: drawCommodus
  },
  {
    name: "Tigris",
    nameLA: "Tigris Galliae",
    stats: { fuerza:4, velocidad:5, agilidad:4, resistencia:3, armas:3 },
    draw: drawTigris
  },
];

const STAT_LABELS = {
  es: { fuerza:'Fuerza', velocidad:'Velocidad', agilidad:'Agilidad', resistencia:'Resistencia', armas:'Armas' },
  en: { fuerza:'Strength', velocidad:'Speed', agilidad:'Agility', resistencia:'Endurance', armas:'Weapons' },
  ca: { fuerza:'Força', velocidad:'Velocitat', agilidad:'Agilitat', resistencia:'Resistència', armas:'Armes' },
  and:{ fuerza:'Fuerza', velocidad:'Velocidá', agilidad:'Agilidá', resistencia:'Resistensia', armas:'Armah' },
  de: { fuerza:'Stärke', velocidad:'Tempo', agilidad:'Agilität', resistencia:'Ausdauer', armas:'Waffen' },
  el: { fuerza:'Δύναμη', velocidad:'Ταχύτητα', agilidad:'Ευελιξία', resistencia:'Αντοχή', armas:'Όπλα' },
  la: { fuerza:'Vis', velocidad:'Celeritas', agilidad:'Agilitas', resistencia:'Resistentia', armas:'Arma' },
  ja: { fuerza:'力', velocidad:'速度', agilidad:'敏捷性', resistencia:'耐久力', armas:'武器' },
};

const BTN_LABELS = {
  es:'Elegir Gladiador', en:'Choose Gladiator', ca:'Escull Gladiador', and:'Escoger Gladiadó',
  de:'Gladiator Wählen', el:'Επίλεξε Μαχητή', la:'Elige Gladiatorem', ja:'剣闘士を選ぶ',
};
const BACK_LABELS = {
  es:'Volver', en:'Back', ca:'Tornar', and:'Pazatráh',
  de:'Zurück', el:'Πίσω', la:'Redi', ja:'戻る',
};

let current = 0;
const lang = () => localStorage.getItem('medieval_lang') || 'es';

// ══════════════════════════════════════════════
// NAVEGACIÓN
// ══════════════════════════════════════════════
function navigate(dir) {
  current = (current + dir + GLADIATORS.length) % GLADIATORS.length;
  render();
}

function render() {
  const g = GLADIATORS[current];
  const l = lang();

  // Nombre
  document.getElementById('gladiator-name').textContent = g.nameLA;

  // SVG gladiador
  const svg = document.getElementById('gladiator-svg');
  svg.innerHTML = '';
  svg.style.animation = 'none';
  void svg.offsetWidth;
  svg.style.animation = 'gladiator-in .35s ease both';
  g.draw(svg);

  // Stats
  const labels = STAT_LABELS[l] || STAT_LABELS.es;
  const grid = document.getElementById('stats-grid');
  grid.innerHTML = '';
  Object.entries(g.stats).forEach(([key, val]) => {
    const item = document.createElement('div');
    item.className = 'stat-item';
    const stars = Array.from({length:5}, (_,i) =>
      `<span class="star ${i < val ? 'on' : 'off'}">★</span>`
    ).join('');
    item.innerHTML = `<div class="stat-name">${labels[key]||key}</div><div class="stars">${stars}</div>`;
    grid.appendChild(item);
  });

  // Dots
  const dots = document.getElementById('dots');
  dots.innerHTML = '';
  GLADIATORS.forEach((_,i) => {
    const d = document.createElement('div');
    d.className = 'dot' + (i===current?' active':'');
    d.onclick = () => { current=i; render(); };
    d.style.cursor='pointer';
    dots.appendChild(d);
  });

  // Traducciones estáticas
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const k = el.getAttribute('data-i18n');
    if (k==='btn_choose') el.textContent = BTN_LABELS[l]||BTN_LABELS.es;
    if (k==='btn_back')   el.textContent = BACK_LABELS[l]||BACK_LABELS.es;
  });
}

function chooseGladiator() {
  const g = GLADIATORS[current];
  localStorage.setItem('selectedGladiator', g.name);
  const nameEl = document.getElementById('gladiator-name');
  nameEl.style.color = '#fff8e0';
  nameEl.style.textShadow = '0 0 30px #f0c96e, 0 0 60px #c9933a';
  setTimeout(() => { nameEl.style.color=''; nameEl.style.textShadow=''; }, 1200);
}

// ══════════════════════════════════════════════
// DIBUJOS SVG DE GLADIADORES
// ══════════════════════════════════════════════

// Colores piel / ropa comunes
const SKIN  = '#c8906a';
const SKIN2 = '#a87050';
const HAIR  = '#2a1800';
const DARK  = '#1a0d02';

function setSVG(svg, content) {
  svg.setAttribute('viewBox','0 0 200 420');
  svg.innerHTML = content;
}

// ─── GLADIADOR 1: Spartacus — sin armadura, sin arma ───
function drawSpartacus(svg) {
  setSVG(svg, `
    <!-- sombra -->
    <ellipse cx="100" cy="415" rx="52" ry="8" fill="#000" opacity=".4"/>
    <!-- piernas -->
    <rect x="78" y="305" width="20" height="90" rx="6" fill="${SKIN2}"/>
    <rect x="102" y="305" width="20" height="90" rx="6" fill="${SKIN2}"/>
    <!-- sandalias -->
    <rect x="74" y="385" width="28" height="14" rx="3" fill="#3a2010"/>
    <rect x="98" y="385" width="28" height="14" rx="3" fill="#3a2010"/>
    <!-- correas sandalia -->
    <line x1="80" y1="388" x2="80" y2="396" stroke="#5a3820" stroke-width="2"/>
    <line x1="86" y1="388" x2="86" y2="396" stroke="#5a3820" stroke-width="2"/>
    <line x1="104" y1="388" x2="104" y2="396" stroke="#5a3820" stroke-width="2"/>
    <line x1="110" y1="388" x2="110" y2="396" stroke="#5a3820" stroke-width="2"/>
    <!-- falda corta (subligaculum) sin ornamentos -->
    <path d="M72,230 Q100,240 128,230 L122,310 Q100,318 78,310 Z" fill="#5a3e28"/>
    <!-- cinturón simple -->
    <rect x="72" y="228" width="56" height="10" rx="2" fill="#3a2210"/>
    <!-- torso desnudo -->
    <rect x="72" y="160" width="56" height="72" rx="8" fill="${SKIN}"/>
    <!-- músculos pecho -->
    <ellipse cx="89" cy="175" rx="12" ry="9" fill="${SKIN2}" opacity=".5"/>
    <ellipse cx="111" cy="175" rx="12" ry="9" fill="${SKIN2}" opacity=".5"/>
    <!-- abdomen -->
    <ellipse cx="89" cy="196" rx="7" ry="5" fill="${SKIN2}" opacity=".4"/>
    <ellipse cx="111" cy="196" rx="7" ry="5" fill="${SKIN2}" opacity=".4"/>
    <!-- brazos -->
    <rect x="46" y="162" width="28" height="16" rx="7" fill="${SKIN}"/>
